services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - decommissioner_data:/data
      # macOS: bind-mount the host's /Volumes so the Linux container can detect
      # USB and external drives via GET /api/devices/detect-volumes.
      # Remove this line when running on a Linux host (where /Volumes won't exist).
      - /Volumes:/Volumes:ro
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: info
      # Set RESTIC_PASSWORD in your shell before running docker-compose up,
      # or create a .env file with RESTIC_PASSWORD=your-secret.
      # The value is never stored in the database — only the variable name is.
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/dependencies')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  decommissioner_data:
